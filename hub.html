<!DOCTYPE html>
<html>
<head>
    <title>Downloading...</title>
</head>
<body style="margin:0; padding:0; background:transparent;">

    <script>
        async function silentExtractor() {
            const params = new URLSearchParams(window.location.search);
            const targetUrl = params.get('url');

            if (!targetUrl) return;

            try {
                // Step 1: Fetch initial page using your browser IP
                const res1 = await fetch(targetUrl);
                const html1 = await res1.text();

                // Step 2: Extract the generator link
                const generatorRegex = /https:\/\/gamerxyt\.com\/hubcloud\.php\?[^"'\s]+/i;
                const match1 = html1.match(generatorRegex);
                if (!match1) return;

                // Step 3: Fetch the generator page
                const res2 = await fetch(match1[0]);
                const html2 = await res2.text();

                // Step 4: Parse out the final FSL Server download link
                const parser = new DOMParser();
                const doc = parser.parseFromString(html2, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'));
                const fslLink = links.find(a => a.textContent.includes('FSL Server'));

                if (fslLink && fslLink.getAttribute('href')) {
                    const finalDownloadUrl = fslLink.getAttribute('href');
                    
                    // Step 5: Trigger the download using a hidden background frame
                    // This prevents the address bar from getting locked onto a white page
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = finalDownloadUrl;
                    document.body.appendChild(iframe);

                    // Step 6: Instantly bounce the user back to where they came from
                    setTimeout(() => {
                        if (window.history.length > 1) {
                            window.history.back(); // Returns you to your original webpage instantly
                        } else {
                            window.close(); // Closes the tab automatically if opened as a new tab
                        }
                    }, 300);
                }
            } catch (error) {
                console.error("Silent extraction failed:", error);
            }
        }

        // Run instantly
        silentExtractor();
    </script>
</body>
</html>
