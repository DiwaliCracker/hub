<!DOCTYPE html>
<html>
<head>
    <title>Processing Media Stream...</title>
</head>
<body style="margin:0; padding:0; background:transparent;">

    <script>
        // The core proxy engine from your bypasser layout to clear 403 blocks
        const corsProxies = [
            'https://api.allorigins.win/get?url=',
            'https://thingproxy.freeboard.io/fetch/',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        async function smartFetch(url) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.text();
            } catch (e) {
                for (let proxy of corsProxies) {
                    try {
                        const proxyUrl = `${proxy}${encodeURIComponent(url)}`;
                        const response = await fetch(proxyUrl);
                        if (!response.ok) continue;

                        if (proxy.includes('allorigins.win')) {
                            const data = await response.json();
                            return data.contents;
                        } else {
                            return await response.text();
                        }
                    } catch (proxyError) {}
                }
            }
            throw new Error("All proxy pathways blocked.");
        }

        async function executeBypass() {
            const params = new URLSearchParams(window.location.search);
            const targetUrl = params.get('url');

            if (!targetUrl) return;

            try {
                let cleanUrl = targetUrl;
                if (/^https:\/\/vifix\.site\/hubcloud\/([a-z0-9]+)$/i.test(targetUrl)) {
                    cleanUrl = `https://hubcloud.one/drive/${targetUrl.split("/").pop()}`;
                }

                const html1 = await smartFetch(cleanUrl);
                const parser = new DOMParser();
                const doc1 = parser.parseFromString(html1, 'text/html');
                const downloadBtn = doc1.getElementById('download');
                
                if (!downloadBtn || !downloadBtn.getAttribute('href')) return;
                
                let hubcloudPhpUrl = downloadBtn.getAttribute('href');
                if (hubcloudPhpUrl.startsWith('/')) {
                    const baseUrl = new URL(cleanUrl);
                    hubcloudPhpUrl = `${baseUrl.origin}${hubcloudPhpUrl}`;
                }

                const html2 = await smartFetch(hubcloudPhpUrl);
                const doc2 = parser.parseFromString(html2, 'text/html');
                const allLinks = Array.from(doc2.querySelectorAll('a'));

                let finalDownloadUrl = null;

                for (const link of allLinks) {
                    const href = link.getAttribute('href');
                    if (!href) continue;

                    if (
                        href.includes("r2.dev") || 
                        href.includes("cloudflare") || 
                        href.includes("pixeldrain") || 
                        href.includes("workers.dev") || 
                        href.includes("googleusercontent") ||
                        href.includes("obsession.buzz") ||
                        href.match(/\.(zip|rar|7z|mkv|mp4|avi|mov)$/i) ||
                        link.textContent.includes('FSL Server')
                    ) {
                        if (href.includes("pixeldrain.com/u/")) {
                            finalDownloadUrl = "https://pixeldrain.com/api/file/" + href.split("/u/").pop();
                        } else {
                            finalDownloadUrl = href;
                        }
                        break;
                    }
                }

                if (finalDownloadUrl) {
                    // DYNAMIC ENVIRONMENT CHECK: Is this embedded inside a player engine frame?
                    const isEmbeddedInPlayer = window.self !== window.top;

                    if (isEmbeddedInPlayer) {
                        // MODE A: Video Player Context
                        // 1. Dispatch a data message upward in case your player script reads messaging events
                        window.top.postMessage({
                            status: 'success',
                            type: 'video_stream',
                            url: finalDownloadUrl
                        }, '*');

                        // 2. Convert this underlying frame context directly into the raw video stream destination
                        window.location.replace(finalDownloadUrl);
                    } else {
                        // MODE B: Standalone Search Bar Mode (Silent Background Download)
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = finalDownloadUrl;
                        document.body.appendChild(iframe);

                        setTimeout(() => {
                            if (window.history.length > 1) {
                                window.history.back();
                            } else {
                                window.close();
                            }
                        }, 500);
                    }
                }

            } catch (error) {
                console.error("Extraction engine failure:", error);
                if (window.self !== window.top) {
                    window.top.postMessage({ status: 'error', message: error.message }, '*');
                }
            }
        }

        executeBypass();
    </script>
</body>
</html>
